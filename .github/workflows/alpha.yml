name: (alpha)Deploy To Cloudflare

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  cicd:
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/') }}
    uses: mss-boot-io/mss-boot-admin-antd/.github/workflows/cf.yml@main
    with:
      env: alpha
    secrets: 
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
