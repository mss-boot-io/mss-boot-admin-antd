name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm lint:js
      - name: Type check
        run: pnpm tsc
      - name: Unit tests
        run: pnpm test -- --runInBand
      - name: Build local
        run: pnpm build:local
